language: node_js
node_js:
  - 4.1
script:
  - '[ "$TRAVIS_BRANCH" == master ] && [ "$TRAVIS_PULL_REQUEST" == "false" ] && npm run build'
env:
  global:
    secure: ''

after_success:
  - cd build
  - git config user.email "mugen.xyz@gmail.com"
  - git config user.name "sunya9 from Travis-CI"
  - git init
  - git add .
  - git commit -m 'Update'
  - git push --force --quiet 'https://${GH_TOKEN}@github.com/unsweets.net.git' master:gh-pages > /dev/null 2>&1